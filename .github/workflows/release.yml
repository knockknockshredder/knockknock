name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-14
            args: --target aarch64-apple-darwin
            rust_target: aarch64-apple-darwin
          - platform: macos-14
            args: --target x86_64-apple-darwin
            rust_target: x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ''
            rust_target: ''
          - platform: windows-latest
            args: ''
            rust_target: ''

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v5

      - name: Install system dependencies (Ubuntu)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libgtk-4-dev

      - name: Install pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'KnockKnock ${{ github.ref_name }}'
          releaseBody: |
            ## KnockKnock ${{ github.ref_name }}
            
            Emergency file shredder with browser profile cleanup.
            
            ### Downloads
            Download the installer for your platform below.
            
            ### Installation
            - **Windows:** Run the `.exe` installer or `.msi` package
            - **macOS:** Open `.dmg`, drag to Applications, right-click → Open on first launch
            - **Linux:** `sudo dpkg -i *.deb` or run the `.AppImage` directly
            
            ### What's New
            - Initial release
            - One-click file shredding (NIST 800-88 Clear)
            - Browser profile cleanup (Chrome, Firefox, Edge, Safari, Brave, Opera, Vivaldi)
            - SSD-aware shredding with TRIM
            - PIN protection
            - System tray support
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
